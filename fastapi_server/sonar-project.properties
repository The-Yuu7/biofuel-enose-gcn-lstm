# SonarQube Project Configuration File
# Place this file in the root of your FastAPI server directory (fastapi_server/)

# Unique identifier and project metadata
sonar.projectKey=fastapi-enose
sonar.projectName=E-Nose Biofuel Quality Control FastAPI
sonar.projectVersion=1.0.0

# Path to the source directories (comma-separated, relative to this file)
sonar.sources=api.py

# Path to test directories/files
sonar.tests=test_api.py

# Language specifications
sonar.language=py
sonar.python.version=3

# Encoding of the source code files
sonar.sourceEncoding=UTF-8

# Test Coverage Integration
# Path to the xml coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (exclude binaries, pickles, virtual environments and cache directories from analysis)
sonar.exclusions=model/**, **/venv/**, **/.venv/**, **/tests/**, **/__pycache__/**, .pytest_cache/**
